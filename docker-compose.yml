services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: moca-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - WORKSPACES_ROOT=/app/data/workspaces
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-http://opencode:4096}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-change-me}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - STT_BASE_URL=${STT_BASE_URL:-}
      - STT_API_KEY=${STT_API_KEY:-}
      - DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE:-Europe/Vilnius}
      - DAILY_QUOTA_LIMIT=${DAILY_QUOTA_LIMIT:-20}
      - WELCOME_QUOTA=${WELCOME_QUOTA:-30}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: moca-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
