services:
  opencode:
    build:
      context: .
      dockerfile: apps/opencode/Dockerfile
    container_name: moca-opencode
    restart: unless-stopped
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-opencode-secret}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      - ./data/opencode-config:/root/.config/opencode
      - ./data/opencode-data:/root/.local/share/opencode
    healthcheck:
      test: ["CMD", "curl", "-sf", "-u", "opencode:${OPENCODE_SERVER_PASSWORD:-opencode-secret}", "http://localhost:4096/global/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: moca-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - JWT_SECRET=${JWT_SECRET:-db4820cfddffbd2595ec56de64fe6776458fe620dac535a5caf1a512a40f063e}
      - WORKSPACES_ROOT=/app/data/workspaces
      - OPENCODE_BASE_URL=http://opencode:4096
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-opencode-secret}
      - ALLOW_LOCAL_OPENCODE_FALLBACK=false
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
      - STT_API_URL=${STT_API_URL:-}
      - STT_API_KEY=${STT_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,https://openagent.kulinich.ru}
      - DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE:-Europe/Vilnius}
      - DAILY_QUOTA_LIMIT=${DAILY_QUOTA_LIMIT:-20}
      - WELCOME_QUOTA=${WELCOME_QUOTA:-30}
    volumes:
      - ./data/backend:/app/data
    depends_on:
      opencode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: moca-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default
      - tghub-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=tghub-network"
      - "traefik.http.routers.moca-frontend.rule=Host(`openagent.kulinich.ru`)"
      - "traefik.http.routers.moca-frontend.entrypoints=websecure"
      - "traefik.http.routers.moca-frontend.tls=true"
      - "traefik.http.routers.moca-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.moca-frontend.loadbalancer.server.port=80"

networks:
  tghub-network:
    external: true
